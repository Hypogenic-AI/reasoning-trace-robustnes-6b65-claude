idea:
  title: 'Reasoning Trace Length as a Proxy for Robustness: A Systematic Investigation'
  domain: nlp
  hypothesis: "There exists a non-monotonic relationship between reasoning trace length\
    \ and out-of-distribution (OOD) robustness in large language models: both overly\
    \ short and overly verbose traces can harm performance, and the optimal trace\
    \ length may depend on task distribution. Adaptive trace length controls\u2014\
    potentially informed by uncertainty\u2014will outperform fixed-length approaches\
    \ in maximizing generalization.\n"
  background:
    description: 'Does a longer or more detailed reasoning chain always mean better
      generalization? Systematically vary and constrain reasoning trace lengths in
      LLMs to see how this influences OOD performance and uncertainty expression,
      challenging the assumption that shorter is always better.

      '
    papers:
    - description: '"Why Does Self-Distillation (Sometimes) Degrade the Reasoning
        Capability of LLMs?" J. Kim, X. Luo, M. Kim, S. Lee, D. Kim, J. Jeon, D. Li,
        & Y. Yang (2026).'
